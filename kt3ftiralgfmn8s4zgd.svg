<head>
<title>Schneeman isst Kekse Animation</title>
</head>
<body>


<svg width="400" height="400" viewBox="0 0 400 400">
  <rect x="0" y="0" width="400" height="400" fill="#edeae6"></rect>
   <rect x="0" y="0" width="400" height="200" fill="lightblue"></rect>
   <rect x="0" y="0" width="100" height="300" fill="#fc9e05"></rect>




  <!-- K—rper -->
  <circle cx="200" cy="200" r="60" fill="white" stroke="black"/>
  <circle cx="200" cy="140" r="40" fill="white" stroke="black"/>
  <circle cx="200" cy="90" r="25" fill="white" stroke="black"/>

  <!-- Augen -->
  <circle cx="190" cy="85" r="3" fill="black"/>
  <circle cx="210" cy="85" r="3" fill="black"/>

  <!-- Mund -->
  <ellipse cx="200" cy="100" rx="8" ry="5" fill="black"/>

  <!-- Arm (winkend) -->
  <line x1="240" y1="150" x2="320" y2="100" stroke="#542807" stroke-width="5">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 260 150"
      to="30 260 150"
      dur="2s"
      repeatCount="indefinite"
      direction="alternate"/>
  </line>

  <!-- anderer Arm -->
  <line x1="160" y1="150" x2="100" y2="180" stroke="#542807" stroke-width="5"/>

 
  <!-- Sterne -->
  <g id="stars" fill="#ba8734">

    <!-- Stern 1 -->
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3">
      <animateMotion dur="2s" repeatCount="indefinite"
        path="M 50 50 Q 200 50 200 100"/>
    </polygon>

    <!-- Stern 2 -->
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3">
      <animateMotion dur="2s" begin="0.4s" repeatCount="indefinite"
        path="M 60 80 Q 200 60 200 100"/>
    </polygon>

    <!-- Stern 3 -->
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3">
      <animateMotion dur="2s" begin="0.8s" repeatCount="indefinite"
        path="M 80 30 Q 200 40 200 100"/>
    </polygon>

    <!-- Stern 4 -->
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3">
      <animateMotion dur="2s" begin="1.2s" repeatCount="indefinite"
        path="M 30 120 Q 200 80 200 100"/>
    </polygon>

    <!-- Stern 5 -->
    <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3">
      <animateMotion dur="2s" begin="1.6s" repeatCount="indefinite"
        path="M 100 150 Q 200 90 200 100"/>
    </polygon>

  </g>

</svg>

</body>